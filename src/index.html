    <!-- ✅ Instant CSS Loader (shows immediately before Angular loads) -->
    <style>
      #instant-loader {
        position: fixed; /* stays within the relative parent */
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;

        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgba(0, 0, 0, 1);
        backdrop-filter: blur(5px);

        z-index: 50;
      }

      #instant-loader.loaded {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease-out; /* Faster transition */
      }

      .pl {
        width: 3em; /* Reduced size for faster rendering */
        height: 3em;
      }

      .pl__ring {
        animation: ringA 1.5s linear infinite; /* Faster animation */
      }

      .pl__ring--a {
        stroke: #f42f25;
      }

      .pl__ring--b {
        animation-name: ringB;
        stroke: #f49725;
      }

      .pl__ring--c {
        animation-name: ringC;
        stroke: #255ff4;
      }

      .pl__ring--d {
        animation-name: ringD;
        stroke: #f42582;
      }

      /* Simplified animations for better performance */
      @keyframes ringA {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes ringB {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes ringC {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes ringD {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

    <app-root></app-root>

    <!-- Hide instant loader when Angular is ready -->
    <script>
      // Hide loader after Angular bootstrap or after a short delay
      window.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          var loader = document.getElementById("instant-loader");
          if (loader) {
            loader.classList.add("loaded");
            // Remove from DOM after transition
            setTimeout(function () {
              loader.remove();
            }, 300);
          }
        }, 500); // Adjust timing as needed
      });
    </script>
